<!DOCTYPE html>
<html class="h-full" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="output.css" rel="stylesheet">
    <title>Document</title>
</head>
<body class="h-full">
  <div class="isolate h-full flex-col flex justify-center bg-white px-6 py-24 sm:py-32 lg:px-8 dark:bg-gray-900">
    <div class="mx-auto max-w-2xl text-center">
      <h2 class="text-4xl font-semibold tracking-tight text-balance text-gray-900 sm:text-5xl dark:text-white">Ivisa Automations</h2>
      <p class="mt-2 text-lg/8 text-gray-600 dark:text-gray-400">Automations run on Ivisa and Fastpassport domains</p>
    </div>
    <form id="automationsInfo" class="mx-auto mt-16 max-w-xl sm:mt-20">
      <div class="grid grid-cols-1 gap-x-8 gap-y-6 sm:grid-cols-2">
        <div class="sm:col-span-2">
          <label for="email" class="block text-sm/6 font-semibold text-gray-900 dark:text-white">Email</label>
          <div class="mt-2.5">
            <input id="email" type="text" name="email" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 border-2 border-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 dark:bg-white/5 dark:text-white dark:outline-white/10 dark:placeholder:text-gray-500 dark:focus:outline-indigo-500" />
          </div>
        </div>
        <div class="sm:col-span-2">
          <label for="url" class="block text-sm/6 font-semibold text-gray-900 dark:text-white">Url (Should be formatted as "https://deploy-20260420--53e90552." ending with a dot)</label>
          <div class="mt-2.5">
            <input id="url" type="text" name="url" class="block w-full rounded-md bg-white px-3.5 py-2 text-base text-gray-900 border-2 border-gray-300 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 dark:bg-white/5 dark:text-white dark:outline-white/10 dark:placeholder:text-gray-500 dark:focus:outline-indigo-500" />
          </div>
        </div>
      </div>
      <div class="mt-10">
        <button type="submit" class="block w-full rounded-md bg-indigo-600 px-3.5 py-2.5 text-center text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500">Run Automations</button>
      </div>
    </form>
    <dialog id="dialog"  aria-labelledby="dialog-title" class="fixed inset-0 size-auto max-h-none max-w-none overflow-y-auto bg-transparent backdrop:bg-transparent">
      <el-dialog-backdrop class="fixed inset-0 bg-gray-500/75 transition-opacity data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in dark:bg-gray-900/50"></el-dialog-backdrop>
      <div tabindex="0" class="flex min-h-full items-end justify-center p-4 text-center focus:outline-none sm:items-center sm:p-0">
        <el-dialog-panel class="relative transform overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all data-closed:translate-y-4 data-closed:opacity-0 data-enter:duration-300 data-enter:ease-out data-leave:duration-200 data-leave:ease-in sm:my-8 sm:w-full sm:max-w-sm sm:p-6 data-closed:sm:translate-y-0 data-closed:sm:scale-95 dark:bg-gray-800 dark:outline dark:-outline-offset-1 dark:outline-white/10">
          <div>
            <div class="mx-auto flex size-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-500/10">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" data-slot="icon" aria-hidden="true" class="size-6 text-green-600 dark:text-green-400">
                <path d="m4.5 12.75 6 6 9-13.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div class="mt-3 text-center sm:mt-5">
              <h3 id="dialog-title" class="text-base font-semibold text-gray-900 dark:text-white">Automations Started running</h3>
              <div class="mt-2">
                <p class="text-sm text-gray-500 dark:text-gray-400">A message will be send to slack once the automations are done running.</p>
              </div>
            </div>
          </div>
          <div class="mt-5 sm:mt-6">
            <button type="button" command="close" commandfor="dialog" class="inline-flex w-full justify-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:shadow-none dark:hover:bg-indigo-400 dark:focus-visible:outline-indigo-500">Close</button>
          </div>
        </el-dialog-panel>
      </div>
    </dialog>
  </div>
<script>
  const form = document.querySelector("#automationsInfo")
  async function sendData() {
    const formData = new FormData(form);
    try {
      const response = await fetch("https://n8n-service-donk.onrender.com/webhook/run-automations", {
        method: "POST",
        body: formData,
      });
      console.log(await response.json());
    } catch (e) {
      console.error(e);
    }
  }


  form.addEventListener("submit", (event) => {
    event.preventDefault();
    document.getElementById("dialog").showModal()
    sendData();
  });

</script>

</body>
</html>
